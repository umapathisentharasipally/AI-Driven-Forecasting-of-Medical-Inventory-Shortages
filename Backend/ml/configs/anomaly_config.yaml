  - backorder_frequency_last_12m
paths:
  raw_data: data/raw/medical_inventory.csv
  anomaly_output: data/anomalies/anomaly_results.csv
  model: artifacts/isolation_forest_model.pkl
  report: artifacts/anomaly_report.json
